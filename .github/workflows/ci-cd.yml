name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare .env for CI
        # ビルドおよびpredeployスクリプトの実行に最低限必要な.envファイルを生成します
        run: cp .env.example .env

      - name: Type Check (Phase 1)
        run: npx tsc --noEmit

      - name: Lint (Phase 1)
        run: npm run lint

      - name: Test (Phase 2)
        # パイプラインが停止しないよう、監視モードではなく一度だけ実行するスクリプトを使用します
        run: npm run test:run

      - name: Build (Phase 1)
        run: npm run build

  deploy:
    name: Continuous Deployment (Phase 3)
    needs: ci
    # mainブランチへのpush（マージ）時のみデプロイを実行します
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare .env for Production
        # GitHub Secretsから本番用の環境変数を注入します
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "FIREBASE_ADMIN_UID=${{ secrets.FIREBASE_ADMIN_UID }}" >> .env

      - name: Deploy to Firebase
        # hostingとfirestoreのルールをデプロイします
        run: npx firebase-tools deploy --only hosting,firestore --token ${{ secrets.FIREBASE_TOKEN }}
